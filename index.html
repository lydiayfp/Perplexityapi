<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Stock Analyzer</title><style>body{font-family:system-ui;background:#0b1220;color:#eaf0ff;margin:0}main{max-width:1180px;margin:0 auto;padding:16px}.card{background:#111a2e;border:1px solid #23314f;border-radius:14px;padding:14px;margin:12px 0}input,select,button{padding:12px;border-radius:10px;border:1px solid #23314f;background:#0b1325;color:#eaf0ff}button{background:linear-gradient(135deg,#1d4ed8,#14b8a6);border:none;font-weight:700}.row{display:grid;grid-template-columns:1fr 110px 160px 140px;gap:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #23314f;padding:8px;text-align:left}canvas{width:100%;height:320px;background:#09111f;border-radius:12px;border:1px solid #22304d}@media(max-width:900px){.row,.grid{grid-template-columns:1fr}}</style></head><body><main><h1>Stock Analyzer</h1><div class="card"><div class="row"><input id="ticker" placeholder="AAPL / D05.SI / VWRA.L / unit trust code"><select id="horizon"><option>5</option><option>10</option><option>15</option><option selected>20</option></select><button id="loadBtn">Load / Analyze</button><button id="sampleBtn">Sample</button></div><p id="status">Enter a ticker and press Load / Analyze.</p></div><div class="grid"><div class="card"><h2>Signal</h2><div id="signal">—</div><div id="price">—</div><div id="intrinsic">—</div><div id="mos">—</div></div><div class="card"><h2>Ratios</h2><table><tbody id="metrics"></tbody></table></div></div><div class="card"><h2>Price / EBITA / FCF</h2><canvas id="chart"></canvas></div><div class="card"><h2>Sources</h2><div id="sources"></div></div><div class="card"><h2>API Endpoint</h2><div><code>/api/quote?ticker=XXXX</code></div></div></main><script src="app.js"></script></body></html>
